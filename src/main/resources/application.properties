quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=move
quarkus.datasource.password=move
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/move-intranet

quarkus.hibernate-orm.database.generation=none

# Google OAuth2 / OIDC
quarkus.oidc.application-type=web-app
quarkus.oidc.provider=google
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID}
quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET}
quarkus.oidc.scopes=openid,email,profile
quarkus.oidc.token.principal-claim=email

# Apos autenticacao bem-sucedida, redirecionar para home
quarkus.oidc.authentication.redirect-path=/Home/index

# Logout: invalidar sessão e voltar para tela de login
quarkus.oidc.logout.path=/logout
quarkus.oidc.logout.post-logout-path=/Login/index

# Polliticas de seguranca HTTP
# Rotas publicas (login, assets, endpoints do Quarkus)
quarkus.http.auth.permission.public.paths=/Login,/Login/*,/logout,/q/*,/move.css,/favicon.ico
quarkus.http.auth.permission.public.policy=permit

# Tudo mais exige autenticacao
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated