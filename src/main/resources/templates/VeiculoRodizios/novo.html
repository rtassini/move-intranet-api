{#include main.html}
{#title}Nova Regra de Rodízio{/title}

<div class="max-w-xl mx-auto py-8 px-6">
  <div class="mb-6">
    <a href="{uri:VeiculoRodizios.lista}" class="text-sm text-gray-500 hover:underline">← Voltar</a>
    <h1 class="text-2xl font-semibold mt-1">Nova Regra de Rodízio</h1>
  </div>

  {#form uri:VeiculoRodizios.salvar()}

    <fieldset class="form-section">
      <legend>Dados do Rodízio</legend>

      <div class="field" style="max-width: 150px;">
        <label>Final da Placa (0–9) *</label>
        <select name="finalPlaca" {#ifError 'finalPlaca'}class="error"{/}>
          <option value="">Selecione</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
        {#ifError 'finalPlaca'}<span class="error-msg">{#error 'finalPlaca'/}</span>{/ifError}
      </div>

      <div class="field">
        <label>Dia do Rodízio *</label>
        <select name="descricao" {#ifError 'descricao'}class="error"{/}>
          <option value="">Selecione</option>
          <option value="SEGUNDA-FEIRA">Segunda-feira</option>
          <option value="TERÇA-FEIRA">Terça-feira</option>
          <option value="QUARTA-FEIRA">Quarta-feira</option>
          <option value="QUINTA-FEIRA">Quinta-feira</option>
          <option value="SEXTA-FEIRA">Sexta-feira</option>
        </select>
        {#ifError 'descricao'}<span class="error-msg">{#error 'descricao'/}</span>{/ifError}
      </div>
    </fieldset>

    <div class="flex gap-3 mt-6">
      <button type="submit"
              class="bg-move-red text-white px-6 py-2 rounded text-sm hover:bg-move-red-dark transition">
        Cadastrar
      </button>
      <a href="{uri:VeiculoRodizios.lista}"
         class="px-6 py-2 rounded text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
        Cancelar
      </a>
    </div>

  {/form}
</div>

{/include}
