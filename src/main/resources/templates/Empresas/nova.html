{#include main.html}
{#title}Nova Empresa{/title}

<div class="max-w-2xl mx-auto py-10 px-6">
  <h1 class="text-2xl font-semibold mb-8">Nova Empresa</h1>

  {#form uri:Empresas.salvar}
  <div class="space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Razão Social <span class="text-red-500">*</span></label>
        <input type="text" name="razaoSocial" required maxlength="200"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CNPJ <span class="text-red-500">*</span></label>
        <input type="text" name="cnpj" required maxlength="18"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red"
               placeholder="00.000.000/0000-00" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Inscrição Estadual</label>
        <input type="text" name="inscricaoEstadual" maxlength="20"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Ramo de Atividade</label>
        <input type="text" name="ramoAtividade" maxlength="100"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red">
          <option value="ATIVO" selected>Ativo</option>
          <option value="INATIVO">Inativo</option>
        </select>
      </div>
    </div>

    <hr class="border-gray-200" />
    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Endereço</p>

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Logradouro</label>
        <input type="text" name="logradouro" maxlength="200"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Número</label>
        <input type="text" name="numero" maxlength="20"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Complemento</label>
        <input type="text" name="complemento" maxlength="100"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Bairro</label>
        <input type="text" name="bairro" maxlength="100"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cidade</label>
        <input type="text" name="cidade" maxlength="100"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">UF</label>
        <input type="text" name="uf" maxlength="2"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red"
               placeholder="SP" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CEP</label>
        <input type="text" name="cep" maxlength="9"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-move-red"
               placeholder="00000-000" />
      </div>
    </div>

  </div>

  <div class="flex gap-3 mt-8">
    <button type="submit"
            class="bg-move-red text-white px-6 py-2 rounded text-sm hover:bg-move-red-dark transition">
      Salvar
    </button>
    <a href="{uri:Empresas.lista}"
       class="px-6 py-2 rounded text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
      Cancelar
    </a>
  </div>
  {/form}
</div>

{/include}
