{#include main.html}
{#title}Editar Local{/title}

<div class="max-w-xl mx-auto py-8 px-6">
  <div class="mb-6">
    <a href="{uri:Locais.lista}" class="text-sm text-gray-500 hover:underline">← Voltar</a>
    <h1 class="text-2xl font-semibold mt-1">Editar Local</h1>
  </div>

  {#form uri:Locais.atualizar(local.id)}

    <fieldset class="form-section">
      <legend>Dados do Local</legend>

      <div class="field">
        <label>Descrição *</label>
        <input name="descricao" value="{local.descricao}" {#ifError 'descricao'}class="error"{/}/>
        {#ifError 'descricao'}<span class="error-msg">{#error 'descricao'/}</span>{/ifError}
      </div>

      <div class="field" style="max-width: 100px;">
        <label>UF</label>
        <input name="uf" maxlength="2" value="{local.uf}"/>
      </div>
    </fieldset>

    <div class="flex gap-3 mt-6">
      <button type="submit"
              class="bg-move-red text-white px-6 py-2 rounded text-sm hover:bg-move-red-dark transition">
        Salvar
      </button>
      <a href="{uri:Locais.lista}"
         class="px-6 py-2 rounded text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
        Cancelar
      </a>
    </div>

  {/form}
</div>

{/include}
