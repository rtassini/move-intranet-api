{#include main.html}
{#title}Nova Pessoa{/title}

<div class="max-w-4xl mx-auto py-8 px-6">
  <div class="mb-6">
    <a href="{uri:Pessoas.lista}" class="text-sm text-gray-500 hover:underline">← Voltar</a>
    <h1 class="text-2xl font-semibold mt-1">Nova Pessoa</h1>
  </div>

  {#form uri:Pessoas.salvar()}

    <fieldset class="form-section">
      <legend>Dados Pessoais</legend>

      <div class="field">
        <label>Nome Completo *</label>
        <input name="nomeCompleto" {#ifError 'nomeCompleto'}class="error"{/}/>
        {#ifError 'nomeCompleto'}<span class="error-msg">{#error 'nomeCompleto'/}</span>{/ifError}
      </div>

      <div class="form-row">
        <div class="field">
          <label>Nome Social</label>
          <input name="nomeSocial"/>
        </div>
        <div class="field">
          <label>Sexo</label>
          <select name="sexo">
            <option value="">--</option>
            <option value="MASCULINO">Masculino</option>
            <option value="FEMININO">Feminino</option>
            <option value="NAO_INFORMADO">Não Informado</option>
          </select>
        </div>
        <div class="field">
          <label>Data de Nascimento</label>
          <input type="date" name="dataNascimento"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Estado Civil</label>
          <select name="estadoCivil">
            <option value="">--</option>
            <option value="SOLTEIRO">Solteiro(a)</option>
            <option value="CASADO">Casado(a)</option>
            <option value="DIVORCIADO">Divorciado(a)</option>
            <option value="VIUVO">Viúvo(a)</option>
            <option value="UNIAO_ESTAVEL">União Estável</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo Sanguíneo</label>
          <select name="tipoSanguineo">
            <option value="">--</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
        <div class="field">
          <label>Raça</label>
          <select name="raca">
            <option value="">--</option>
            <option value="BRANCA">Branca</option>
            <option value="PRETA">Preta</option>
            <option value="PARDA">Parda</option>
            <option value="AMARELA">Amarela</option>
            <option value="INDIGENA">Indígena</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Nome da Mãe</label>
          <input name="nomeMae"/>
        </div>
        <div class="field">
          <label>Nome do Pai</label>
          <input name="nomePai"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Nacionalidade</label>
          <input name="nacionalidade"/>
        </div>
        <div class="field">
          <label>Naturalidade</label>
          <input name="naturalidade"/>
        </div>
        <div class="field">
          <label>Religião</label>
          <input name="religiao"/>
        </div>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Deficiência e Dependentes</legend>

      <div class="checkbox-field">
        <input type="checkbox" name="possuiDependentes" value="true" id="possuiDependentes"/>
        <label for="possuiDependentes">Possui Dependentes</label>
      </div>

      <div class="checkbox-field">
        <input type="checkbox" name="pcd" value="true" id="pcd"/>
        <label for="pcd">PCD (Pessoa com Deficiência)</label>
      </div>

      <div class="field">
        <label>Tipo de Deficiência</label>
        <input name="tipoDeficiencia"/>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Escolaridade</legend>

      <div class="form-row">
        <div class="field">
          <label>Escolaridade</label>
          <select name="escolaridade">
            <option value="">--</option>
            <option value="FUNDAMENTAL_INCOMPLETO">Fundamental Incompleto</option>
            <option value="FUNDAMENTAL_COMPLETO">Fundamental Completo</option>
            <option value="MEDIO_INCOMPLETO">Médio Incompleto</option>
            <option value="MEDIO_COMPLETO">Médio Completo</option>
            <option value="SUPERIOR_INCOMPLETO">Superior Incompleto</option>
            <option value="SUPERIOR_COMPLETO">Superior Completo</option>
            <option value="POS_GRADUACAO">Pós-Graduação</option>
            <option value="MESTRADO">Mestrado</option>
            <option value="DOUTORADO">Doutorado</option>
          </select>
        </div>
        <div class="field">
          <label>Instituição Escolar</label>
          <input name="instituicaoEscolar"/>
        </div>
        <div class="field">
          <label>Data de Conclusão</label>
          <input type="date" name="dataConclusaoEscolar"/>
        </div>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Contato</legend>

      <div class="field" style="max-width: 400px;">
        <label>E-mail</label>
        <input type="email" name="email"/>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>Endereço</legend>

      <div class="form-row">
        <div class="field" style="flex: 3;">
          <label>Logradouro</label>
          <input name="logradouro"/>
        </div>
        <div class="field" style="flex: 1;">
          <label>Número</label>
          <input name="numero"/>
        </div>
        <div class="field" style="flex: 2;">
          <label>Complemento</label>
          <input name="complemento"/>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label>Bairro</label>
          <input name="bairro"/>
        </div>
        <div class="field">
          <label>Cidade</label>
          <input name="cidade"/>
        </div>
        <div class="field" style="flex: 0.5;">
          <label>UF</label>
          <input name="uf" maxlength="2"/>
        </div>
        <div class="field">
          <label>CEP</label>
          <input name="cep" maxlength="9"/>
        </div>
      </div>
    </fieldset>

    <div class="flex gap-3 mt-6">
      <button type="submit"
              class="bg-move-red text-white px-6 py-2 rounded text-sm hover:bg-move-red-dark transition">
        Cadastrar
      </button>
      <a href="{uri:Pessoas.lista}"
         class="px-6 py-2 rounded text-sm border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
        Cancelar
      </a>
    </div>

  {/form}
</div>

{/include}
